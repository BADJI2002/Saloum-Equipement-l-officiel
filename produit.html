<body>

            🛒 <span id="cart-count">0</span>

            <li><a href="index.html#galerie">Galerie</a></li>

            <li><a href="#contact">Contact</a></li>
        </ul>

    <div class="container3">
        <div class="produit-detail">
            <div class="produit-header">
                <a href="index.html#produits" class="btn-retour">
                    <i class="fa-solid fa-arrow-circle-left"></i>
                </a>
                <h1 id="nom" class="produit-nom"></h1>
            </div>

            <!-- Galerie -->
            <div class="produit-images">
                <div class="image-principale">
                    <img id="image-principale" src="" alt="Produit" />
                </div>
                <div class="miniatures">
                    <img id="image-secondaire1" src="" alt="Produit secondaire1" />
                    <img id="image-secondaire2" src="" alt="Produit secondaire2" />
                </div>
            </div>

            <!-- Texte -->
            <p id="description"></p>
            <h2 class="prix" id="prix" class="produit-prix"></h2>

            <!-- Bouton -->
            <button class="btn-commander" id="btn-commander">Commander</button>
        </div>
    </div>

    <Div class="SPACER">

    </Div>
    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
    <script>
        // Zoom
        function ouvrirZoom(src) {
            document.getElementById("zoom-img").src = src;
            document.getElementById("zoom").style.display = "flex";
        }
        function fermerZoom() {
            document.getElementById("zoom").style.display = "none";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get("id"));

            const produit = produits.find((p) => p.id === id);
            if (!produit) return;

            const images = produit.images?.length ? produit.images : [produit.image];

            // Infos produit
            document.getElementById("nom").textContent = produit.nom;
            document.getElementById("description").textContent = produit.description;
            document.getElementById("prix").textContent =
                produit.prix.toLocaleString("fr-FR") + " CFA";

            // Images
            const imagePrincipale = document.getElementById("image-principale");
            const secondaire1 = document.getElementById("image-secondaire1");
            const secondaire2 = document.getElementById("image-secondaire2");

            imagePrincipale.src = images[0];
            if (images[1]) secondaire1.src = images[1];
            if (images[2]) secondaire2.src = images[2];

            // ✅ Swap avec animation
            const miniatures = document.querySelectorAll(".miniatures img");
            miniatures.forEach((img) => {
                img.addEventListener("click", () => {
                    const temp = imagePrincipale.src;

                    // Animation fade-out
                    imagePrincipale.classList.add("fade-out");

                    setTimeout(() => {
                        // Swap
                        imagePrincipale.src = img.src;
                        img.src = temp;

                        // Animation fade-in
                        imagePrincipale.classList.remove("fade-out");
                        imagePrincipale.classList.add("fade-in");

                        setTimeout(() => {
                            imagePrincipale.classList.remove("fade-in");
                        }, 400);

                        // Active miniature
                        miniatures.forEach((m) => m.classList.remove("active"));
                        img.classList.add("active");
                    }, 300);
                });
            });

            // Zoom sur l'image principale
            imagePrincipale.addEventListener("click", () =>
                ouvrirZoom(imagePrincipale.src)
            );

            // Zoom sur miniature (double clic)
            miniatures.forEach((img) => {
                img.addEventListener("dblclick", () => ouvrirZoom(img.src));
            });

            // Bouton Commander
            document.getElementById("btn-commander").onclick = () => {
                ajouterAuPanier(id);
                showToast(`${produit.nom} ajouté au panier ✅`);
                mettreAJourBadge();
            };
        });
    </script>
